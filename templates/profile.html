              <div class="profile-card-avatar" style="background:#4F46E5;">AD</div>

                <span class="tag">Faculty</span>

            </div>
          </div>

          <!-- Publication Panel -->
          <div class="panel">
            <h3 class="section-title" style="margin-bottom: var(--space-3);">Publication Record</h3>
            <div id="prof-publication" style="font-size: var(--text-sm); color: var(--text-secondary);">

  <script type="module" src="../static/js/app.js"></script>
  <script type="module">
    import { stringToColor, getInitials } from '../static/js/utils.js';
    
    // Simple load logic based on query params
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const name = urlParams.get('name') || 'Dr. Padmaja';
      const role = urlParams.get('role') || 'Agriculture AI / Computer Vision';
      const paper = urlParams.get('paper') || 'Agri-Ai-Intelligent-Plant-Disease-Surveillance-and-Predictive-Forecasting_PADMAJA.pdf';

      const nameEl = document.getElementById('prof-name');
      const roleEl = document.getElementById('prof-role');
      const paperEl = document.getElementById('prof-publication');
      const avatarEl = document.querySelector('.profile-card-avatar');

      if (nameEl) nameEl.textContent = name;
      if (roleEl) roleEl.textContent = role;
      if (paperEl) paperEl.textContent = paper;
      if (avatarEl) {
        avatarEl.textContent = getInitials(name);
        avatarEl.style.background = stringToColor(name);
      }
    });
  </script>
