<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — FRIP</title>
  <link rel="stylesheet" href="../static/css/variables.css">
  <link rel="stylesheet" href="../static/css/base.css">
  <link rel="stylesheet" href="../static/css/layout.css">
  <link rel="stylesheet" href="../static/css/animations.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-base); padding: var(--space-4);">
  <div class="empty-state panel animate-scale-in" style="max-width: 420px; padding: var(--space-8);">
    <div class="empty-state-icon" style="color: var(--color-error); background: var(--color-error-light);">✕</div>
    <h2 style="font-size: var(--text-2xl); font-weight: var(--weight-bold); color: var(--text-primary);">404</h2>
    <h3 style="font-size: var(--text-base); margin-top: -10px;">Page Not Found</h3>
    <p style="font-size: var(--text-sm); color: var(--text-muted); margin-bottom: var(--space-2);">
      The page you are looking for does not exist or has been relocated.
    </p>
    <a href="index.html" class="btn btn-primary ripple" style="width: 100%;">Return to Home</a>
  </div>
</body>
</html>
